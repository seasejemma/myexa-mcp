version: 2
project: myexa-mcp
variables:
  KEYPOOL_EXA_BASE_URL:
    sensitivity: configuration
    owner: keypool
    required_in: [local, deno-development, deno-production]
    constraint: must end with /v1/exa
  KEYPOOL_TOKEN:
    sensitivity: secret
    owner: keypool-caller
    required_in: [local-client]
    forbidden_in: [github-actions, deno-development, deno-production]
    semantics: caller identity and Exa authorization validated by KeyPool
  MCP_SERVER_ENDPOINT:
    sensitivity: configuration
    owner: operator
    required_in: [local-client]
delivery:
  local-client: ambient shell or ignored .env
  github-actions: none; offline checks only
  deno-development: Deno Deploy Development configuration only
  deno-production: Deno Deploy Production configuration only
source_of_truth:
  contract: this file
  live_configuration: Deno Deploy app settings and each caller environment
  encrypted_recovery: KeyPool operator-owned recovery system
  runtime_bundle: Deno Deploy context configuration
forbidden:
  - KEYPOOL_TOKEN in Deno Deploy
  - KEYPOOL_TOKEN in GitHub Actions
  - KEYPOOL_TEAM_TOKEN
  - MCP_AUTH_TOKEN
  - DENO_DEPLOY_TOKEN in GitHub Actions
  - committed secret values
  - direct Exa API fallback
recovery:
  KEYPOOL_TOKEN: rotate in KeyPool, then update only the affected clients
oauth:
  status: disabled
  reason: upstream accepts Exa-issued JWTs and does not provide KeyPool authorization or token exchange
